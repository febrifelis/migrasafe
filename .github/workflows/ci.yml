name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check safe migration (should exit 0)
        run: node dist/index.js check test-cases/safe.sql

      - name: Check unsafe migration (should exit 1)
        run: |
          node dist/index.js check test-cases/dangerous.sql && exit 1 || exit 0

      - name: Check directory scan
        run: |
          node dist/index.js check test-migrations/ && exit 1 || exit 0

      - name: Check JSON output
        run: node dist/index.js check test-cases/safe.sql --format json | grep '"safe": true'

      - name: Check DROP DATABASE detected
        run: |
          node dist/index.js check test-cases/drop_database.sql && exit 1 || exit 0

      - name: Check ALTER SYSTEM detected
        run: |
          node dist/index.js check test-cases/alter_system.sql && exit 1 || exit 0
