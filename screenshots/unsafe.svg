<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" width="780" height="480">
  <defs>
    <style>
      text { font-family: 'SF Mono','Cascadia Code','Fira Code','Consolas',monospace; font-size: 13px; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="780" height="480" rx="12" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="780" height="40" rx="12" fill="#181825"/>
  <rect y="28" width="780" height="12" fill="#181825"/>
  <!-- Traffic lights -->
  <circle cx="22" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="20" r="6" fill="#27c93f"/>
  <text x="390" y="25" text-anchor="middle" fill="#585b70" font-size="12">zsh — migrasafe</text>

  <!-- Prompt line -->
  <text y="66">
    <tspan x="24" fill="#89b4fa">~/projects</tspan><tspan fill="#585b70"> $ </tspan><tspan fill="#cdd6f4">migrasafe check ./migrations/</tspan>
  </text>

  <!-- Scanning -->
  <text x="24" y="88" fill="#cdd6f4" font-weight="bold">Scanning 3 file(s)...</text>

  <!-- Separator -->
  <line x1="24" y1="100" x2="756" y2="100" stroke="#313244" stroke-width="1"/>

  <!-- File name -->
  <text x="24" y="120" fill="#cdd6f4" text-decoration="underline">migrations/V2__add_status.sql</text>

  <!-- Issue 1: HIGH -->
  <text y="144">
    <tspan x="24" fill="#f38ba8" font-weight="bold">⚠ HIGH</tspan>
    <tspan fill="#585b70">   Line 1</tspan>
  </text>
  <text y="162">
    <tspan x="24" fill="#585b70">  Statement : </tspan><tspan fill="#cdd6f4">ALTER TABLE users ADD COLUMN status VARCHAR(20) NOT NULL</tspan>
  </text>
  <text y="180">
    <tspan x="24" fill="#585b70">  Problem   : </tspan><tspan fill="#cdd6f4">ADD COLUMN NOT NULL without DEFAULT will fail on non-empty tables.</tspan>
  </text>
  <text y="198">
    <tspan x="24" fill="#585b70">  Fix       : </tspan><tspan fill="#89dceb">Use 3 steps: (1) ADD COLUMN nullable, (2) backfill, (3) SET NOT NULL.</tspan>
  </text>

  <!-- Issue 2: CRITICAL -->
  <rect x="24" y="214" width="94" height="20" rx="3" fill="#f38ba8"/>
  <text x="28" y="228" fill="#1e1e2e" font-weight="bold" font-size="12">✖ CRITICAL</text>
  <text x="124" y="228" fill="#585b70">   Line 3</text>

  <text y="248">
    <tspan x="24" fill="#585b70">  Statement : </tspan><tspan fill="#cdd6f4">DROP TABLE old_orders</tspan>
  </text>
  <text y="266">
    <tspan x="24" fill="#585b70">  Problem   : </tspan><tspan fill="#cdd6f4">DROP TABLE is irreversible — all data will be permanently lost.</tspan>
  </text>
  <text y="284">
    <tspan x="24" fill="#585b70">  Fix       : </tspan><tspan fill="#89dceb">Rename the table first, then drop it in a later migration.</tspan>
  </text>

  <!-- Issue 3: MEDIUM -->
  <text y="308">
    <tspan x="24" fill="#f9e2af" font-weight="bold">● MEDIUM</tspan>
    <tspan fill="#585b70">  Line 5</tspan>
  </text>
  <text y="326">
    <tspan x="24" fill="#585b70">  Statement : </tspan><tspan fill="#cdd6f4">CREATE INDEX idx_status ON users(status)</tspan>
  </text>
  <text y="344">
    <tspan x="24" fill="#585b70">  Problem   : </tspan><tspan fill="#cdd6f4">CREATE INDEX without CONCURRENTLY locks the table.</tspan>
  </text>

  <!-- Separator -->
  <line x1="24" y1="360" x2="756" y2="360" stroke="#313244" stroke-width="1"/>

  <!-- Summary -->
  <text x="24" y="380" fill="#cdd6f4" font-weight="bold">── Summary ──────────────────────────────</text>
  <text x="24" y="400" fill="#f38ba8">  CRITICAL : 1</text>
  <text x="24" y="418" fill="#f38ba8">  HIGH     : 1</text>
  <text x="24" y="436" fill="#cdd6f4">  Total    : 3 issue(s) across 3 file(s)</text>

  <!-- Result banner -->
  <rect x="16" y="450" width="748" height="22" rx="3" fill="#3d1a1a"/>
  <text x="24" y="465" fill="#f38ba8" font-weight="bold">✖  UNSAFE — resolve all CRITICAL/HIGH issues before deploying</text>
</svg>
